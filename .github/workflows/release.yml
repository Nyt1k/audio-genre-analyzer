name: release

# Builds the app for macOS, Windows and Linux and attaches the archives to
# the GitHub release. Triggered by pushing a v* tag, or manually
# (workflow_dispatch) to backfill artifacts onto an existing tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: existing tag to attach artifacts to
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build macos --release
        working-directory: app
      - run: >
          ditto -c -k --keepParent
          "app/build/macos/Build/Products/Release/Genre Analyzer.app"
          GenreAnalyzer-macos.zip
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: GenreAnalyzer-macos.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build linux --release
        working-directory: app
      - run: >
          tar -czf GenreAnalyzer-linux-x64.tar.gz
          -C app/build/linux/x64/release bundle
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: GenreAnalyzer-linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter build windows --release
        working-directory: app
      - run: >
          Compress-Archive -Force
          -Path "app\build\windows\x64\runner\Release\*"
          -DestinationPath "GenreAnalyzer-windows-x64.zip"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: GenreAnalyzer-windows-x64.zip
